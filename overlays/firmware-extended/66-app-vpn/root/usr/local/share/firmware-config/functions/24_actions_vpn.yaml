quick_actions:
  upgrades:
    items:
      tailscale-upgrade:
        label: Upgrade Tailscale
        description: Download and install the latest pinned Tailscale version.
        if_cmd: /usr/local/bin/extended-pkg tailscale needs_upgrade
        confirm: "Upgrade Tailscale and restart the VPN service?"
        cmd:
          - bash
          - -ec
          - |
            /usr/local/bin/extended-pkg tailscale upgrade
            /etc/init.d/S99vpn restart
        message: "Upgrading Tailscale..."

actions:
  troubleshooting:
    items:
      tailscale-status:
        label: Tailscale Status
        description: Show current Tailscale connection status and IP address.
        cmd: [/usr/local/bin/tailscale, status]
        message: "Checking Tailscale status..."
