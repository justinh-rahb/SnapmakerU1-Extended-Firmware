[gcode_macro ROUTER_ON_READY]
description: Subscribe to ACE router events when the ACE instance starts.
gcode:
    RESPOND MSG="ace_events: registering event handlers"
    {action_call_remote_method("router/event/subscribe", event="ace_retract", gcode="ON_ACE_RETRACT_CMD LANE={lane} LENGTH={length}")}
    {action_call_remote_method("router/event/subscribe", event="ace_feed", gcode="ON_ACE_FEED_CMD LANE={lane} LENGTH={length} EXTRUDER={extruder}")}
    {action_call_remote_method("router/event/subscribe", event="ace_dry_start", gcode="ON_ACE_DRY_START_CMD TEMP={temp} DURATION={duration}")}
    {action_call_remote_method("router/event/subscribe", event="ace_dry_stop", gcode="ON_ACE_DRY_STOP_CMD")}

[gcode_macro ROUTER_ON_CONNECTED]
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name|lower == 'main' %}
        RESPOND MSG="ace_events: main instance connected"
    {% endif %}

[gcode_macro ROUTER_ON_DISCONNECTED]
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name|lower == 'main' %}
        RESPOND MSG="ace_events: main instance disconnected"
    {% endif %}

[gcode_macro _ACE_PENDING_FEED]
variable_lane: -1
variable_extruder: -1
variable_length: 0
gcode:

[delayed_gcode _ACE_NOTIFY_FEED_DONE]
initial_duration: 0
gcode:
    {% set pending = printer['gcode_macro _ACE_PENDING_FEED'] %}
    RESPOND MSG="ace_events: lane {pending.lane} finished queued feed of {pending.length}mm"
    ROUTER_EVENT_TRIGGER EVENT=ace_feed_done CONTEXT="lane={pending.lane},extruder={pending.extruder},length={pending.length}"

[gcode_macro ON_ACE_RETRACT_CMD]
description: Retract ACE lane to park after the U1 unload completes.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    RESPOND MSG="ace_events: retracting lane {lane} by {length}mm"
    ACE_RETRACT INDEX={lane} LENGTH={length}
    ROUTER_EVENT_TRIGGER EVENT=ace_retract_done CONTEXT="lane={lane}"

[gcode_macro ON_ACE_FEED_CMD]
description: Feed ACE lane to the U1 entry point.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set speed = params.SPEED|default(60)|float %}
    {% set delay = ((length / speed) + 2.0) if speed > 0 else 2.0 %}
    RESPOND MSG="ace_events: feeding lane {lane} by {length}mm"
    SET_GCODE_VARIABLE MACRO=_ACE_PENDING_FEED VARIABLE=lane VALUE={lane}
    SET_GCODE_VARIABLE MACRO=_ACE_PENDING_FEED VARIABLE=extruder VALUE={extruder}
    SET_GCODE_VARIABLE MACRO=_ACE_PENDING_FEED VARIABLE=length VALUE={length}
    ACE_FEED INDEX={lane} LENGTH={length}
    UPDATE_DELAYED_GCODE ID=_ACE_NOTIFY_FEED_DONE DURATION={delay}

[gcode_macro ON_ACE_DRY_START_CMD]
description: Start ACE drying at the requested temperature and duration.
gcode:
    {% set temp = params.TEMP|default(45)|int %}
    {% set duration = params.DURATION|default(480)|int %}
    RESPOND MSG="ace_events: starting drying at {temp}C for {duration}min"
    ACE_START_DRYING TEMP={temp} DURATION={duration}

[gcode_macro ON_ACE_DRY_STOP_CMD]
description: Stop ACE drying.
gcode:
    RESPOND MSG="ace_events: stopping drying"
    ACE_STOP_DRYING

[gcode_macro ACE_RUNOUT_NOTIFY]
description: Forward ACE lane runout to the main instance.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    RESPOND MSG="ace_events: runout on lane {lane}"
    ROUTER_EVENT_TRIGGER EVENT=ace_runout CONTEXT="lane={lane}"
