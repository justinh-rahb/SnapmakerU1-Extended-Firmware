status:
  router:
    title: Klipper Router
    items:
      - label: Service
        cmd: |
          if [ -f /var/run/klipper-router.pid ] && kill -0 "$(cat /var/run/klipper-router.pid 2>/dev/null)" 2>/dev/null; then
            echo Running
          else
            echo Stopped
          fi
      - label: Instances
        cmd: |
          count=0
          for pidfile in /var/run/klippy-router-*.pid; do
            [ -f "$pidfile" ] || continue
            count=$((count + 1))
          done
          echo "$count"
      - label: Log Path
        cmd: echo /home/lava/printer_data/logs/klipper-router.log

settings:
  router:
    items:
      router_enabled:
        label: Router Substrate
        description: Enable the shared klipper-router service and auxiliary Klipper instance manager.
        get_cmd:
          - /usr/local/bin/extended-config.py
          - get
          - /home/lava/printer_data/config/extended/extended2.cfg
          - router
          - enabled
          - "false"
        options:
          "true":
            label: Enabled
            cmd:
              - bash
              - -xc
              - |
                /usr/local/bin/extended-config.py add /home/lava/printer_data/config/extended/extended2.cfg router enabled true
                /etc/init.d/S98klipper-router-instances restart
                /etc/init.d/S99klipper-router restart
          "false":
            label: Disabled
            cmd:
              - bash
              - -xc
              - |
                /usr/local/bin/extended-config.py add /home/lava/printer_data/config/extended/extended2.cfg router enabled false
                /etc/init.d/S99klipper-router stop
                /etc/init.d/S98klipper-router-instances stop
        default: "false"
