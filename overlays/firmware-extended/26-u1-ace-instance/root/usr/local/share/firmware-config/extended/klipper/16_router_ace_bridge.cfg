[gcode_macro _ACE_BRIDGE_STATE]
variable_ace_ready: False
variable_active_lane: -1
variable_mode: 'drybox'
gcode:

[gcode_macro _ACE_TOOL_MONITOR_STATE]
variable_last_tool: -2
variable_enabled: 1
gcode:

[delayed_gcode _ACE_TOOL_MONITOR]
initial_duration: 1.0
gcode:
    {% set mon = printer['gcode_macro _ACE_TOOL_MONITOR_STATE'] %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% set map = printer['gcode_macro _ACE_LANE_MAP'] %}
    {% set tool_name = printer.toolhead.extruder|default('') %}
    {% set tool = -1 %}
    {% set lane = -1 %}
    {% if tool_name == 'extruder' %}
        {% set tool = 0 %}
        {% set lane = map.t0_lane %}
    {% elif tool_name == 'extruder1' %}
        {% set tool = 1 %}
        {% set lane = map.t1_lane %}
    {% elif tool_name == 'extruder2' %}
        {% set tool = 2 %}
        {% set lane = map.t2_lane %}
    {% elif tool_name == 'extruder3' %}
        {% set tool = 3 %}
        {% set lane = map.t3_lane %}
    {% endif %}
    {% if mon.enabled|int == 1 %}
        {% if tool != mon.last_tool|int %}
            RESPOND MSG="ace_bridge: observed active tool T{tool}"
            SET_GCODE_VARIABLE MACRO=_ACE_TOOL_MONITOR_STATE VARIABLE=last_tool VALUE={tool}
        {% endif %}
        {% if state.ace_ready and tool >= 0 and lane >= 0 and state.active_lane|int != lane %}
            RESPOND MSG="ace_bridge: tool T{tool} mapped to lane {lane}, enabling assist"
            ACE_BRIDGE_GRAB LANE={lane}
            SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=active_lane VALUE={lane}
        {% endif %}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=_ACE_TOOL_MONITOR DURATION=1.0

[gcode_macro ROUTER_ON_READY]
description: Subscribe to ACE router events when the main instance is ready.
gcode:
    RESPOND MSG="ace_bridge: registering event handlers"
    {action_call_remote_method("router/event/subscribe", event="ace_retract_done", gcode="ON_ACE_RETRACT_DONE LANE={lane}")}
    {action_call_remote_method("router/event/subscribe", event="ace_feed_done", gcode="ON_ACE_FEED_DONE LANE={lane} EXTRUDER={extruder}")}
    {action_call_remote_method("router/event/subscribe", event="ace_runout", gcode="ON_ACE_RUNOUT LANE={lane}")}

[gcode_macro ROUTER_ON_CONNECTED]
description: Called when a printer connects to the router.
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name|lower == 'ace' %}
        RESPOND MSG="ace_bridge: ACE instance connected"
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=ace_ready VALUE=True
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=active_lane VALUE=-1
    {% endif %}

[gcode_macro ROUTER_ON_DISCONNECTED]
description: Called when a printer disconnects from the router.
gcode:
    {% set printer_name = params.PRINTER|default('') %}
    {% if printer_name|lower == 'ace' %}
        RESPOND MSG="ace_bridge: ACE instance disconnected"
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=ace_ready VALUE=False
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_STATE VARIABLE=active_lane VALUE=-1
    {% endif %}

[gcode_macro ON_ACE_RETRACT_DONE]
description: ACE has finished retracting filament back to park position.
gcode:
    {% set lane = params.LANE|default('-1')|int %}
    RESPOND MSG="ace_bridge: lane {lane} retracted to park"

[gcode_macro ON_ACE_FEED_DONE]
description: ACE has finished feeding filament to the U1 entry point.
gcode:
    {% set lane = params.LANE|default('-1')|int %}
    {% set extruder = params.EXTRUDER|default('-1')|int %}
    RESPOND MSG="ace_bridge: lane {lane} fed to entry, loading extruder {extruder}"
    {% if extruder >= 0 %}
        AUTO_FEEDING EXTRUDER={extruder} LOAD=1
    {% endif %}

[gcode_macro ON_ACE_RUNOUT]
description: ACE detected runout on a lane.
gcode:
    {% set lane = params.LANE|default('-1')|int %}
    RESPOND MSG="ace_bridge: runout detected on lane {lane}"
    PAUSE

[gcode_macro ACE_BRIDGE_RETRACT]
description: Tell ACE to retract a lane back to park after the U1 unload.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_retract CONTEXT="lane={lane},length={length}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, skipping retract"
    {% endif %}

[gcode_macro ACE_BRIDGE_FEED]
description: Tell ACE to feed a lane to the U1 entry point.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_feed CONTEXT="lane={lane},length={length},extruder={extruder}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, calling AUTO_FEEDING directly"
        AUTO_FEEDING EXTRUDER={extruder} LOAD=1
    {% endif %}

[gcode_macro ACE_BRIDGE_DRY_START]
description: Start ACE drying.
gcode:
    {% set temp = params.TEMP|default(45)|int %}
    {% set duration = params.DURATION|default(480)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_dry_start CONTEXT="temp={temp},duration={duration}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot start drying"
    {% endif %}

[gcode_macro ACE_BRIDGE_DRY_STOP]
description: Stop ACE drying.
gcode:
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        ROUTER_EVENT_TRIGGER EVENT=ace_dry_stop
    {% endif %}


[gcode_macro ACE_BRIDGE_RELEASE]
description: Disable ACE feed assist on a lane so filament can be moved more freely.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_DISABLE_FEED_ASSIST INSTANCE=0 INDEX=%d" % (lane))}
        RESPOND MSG="ace_bridge: requested feed assist release on lane {lane}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot release lane"
    {% endif %}

[gcode_macro ACE_BRIDGE_GRAB]
description: Enable ACE feed assist on a lane.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_ENABLE_FEED_ASSIST INSTANCE=0 INDEX=%d" % (lane))}
        RESPOND MSG="ace_bridge: requested feed assist on lane {lane}"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot engage lane"
    {% endif %}


[gcode_macro _ACE_BRIDGE_ASSIST_STATE]
variable_lane: -1
gcode:

[delayed_gcode _ACE_BRIDGE_ASSIST_RELEASE]
initial_duration: 0
gcode:
    {% set st = printer['gcode_macro _ACE_BRIDGE_ASSIST_STATE'] %}
    {% if st.lane >= 0 %}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_DISABLE_FEED_ASSIST INSTANCE=0 INDEX=%d" % (st.lane))}
        RESPOND MSG="ace_bridge: assist pulse released lane {st.lane}"
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_ASSIST_STATE VARIABLE=lane VALUE=-1
    {% endif %}

[gcode_macro ACE_BRIDGE_ASSIST_PULSE]
description: Briefly enable ACE feed assist on a lane, then auto-release it.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set duration = params.DURATION|default(0.8)|float %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_ASSIST_STATE VARIABLE=lane VALUE={lane}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_ENABLE_FEED_ASSIST INSTANCE=0 INDEX=%d" % (lane))}
        UPDATE_DELAYED_GCODE ID=_ACE_BRIDGE_ASSIST_RELEASE DURATION={duration}
        RESPOND MSG="ace_bridge: assist pulse on lane {lane} for {duration}s"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot pulse assist"
    {% endif %}

[gcode_macro ACE_BRIDGE_CLEAR_ACTIVE]
description: Clear ACEPRO persisted active-tool state after manual filament intervention.
gcode:
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_DEBUG_SET_CURRENT_INDEX TOOL=-1")}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_DEBUG_SET_FILAMENT_STATE STATE=bowden")}
        RESPOND MSG="ace_bridge: requested ACE active-tool state clear"
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot clear state"
    {% endif %}

[gcode_macro _ACE_BRIDGE_LOAD_STATE]
variable_active: 0
variable_lane: -1
variable_extruder: -1
variable_autoload: 0
variable_poll_count: 0
variable_max_polls: 90
gcode:

[gcode_macro ACE_BRIDGE_SET_AUTO]
description: Toggle U1 feeder auto mode for one extruder.
gcode:
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set enable = params.ENABLE|default(1)|int %}
    {% set save = params.SAVE|default(0)|int %}
    AUTO_FEEDING EXTRUDER={extruder} AUTO={enable} SAVE={save}

[gcode_macro ACE_BRIDGE_LOAD_STATUS]
description: Show current U1 feeder and toolhead sensor state for one extruder.
gcode:
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% if extruder == 0 %}
        {% set feed = printer['filament_feed left'].extruder0 %}
    {% elif extruder == 1 %}
        {% set feed = printer['filament_feed left'].extruder1 %}
    {% elif extruder == 2 %}
        {% set feed = printer['filament_feed right'].extruder2 %}
    {% elif extruder == 3 %}
        {% set feed = printer['filament_feed right'].extruder3 %}
    {% else %}
        {action_raise_error("ACE_BRIDGE_LOAD_STATUS: EXTRUDER must be 0-3")}
    {% endif %}
    {% set sensor = printer['filament_motion_sensor e%d_filament' % (extruder)] %}
    RESPOND MSG="ace_bridge: extruder {extruder} auto_disabled={feed.disable_auto} module={feed.module_exist} filament={feed.filament_detected} sensor={sensor.filament_detected} state={feed.channel_state} action={feed.channel_action_state} error={feed.channel_error}"

[delayed_gcode _ACE_BRIDGE_LOAD_POLL]
initial_duration: 0
gcode:
    {% set st = printer['gcode_macro _ACE_BRIDGE_LOAD_STATE'] %}
    {% if st.active|int == 1 %}
        {% set sensor = printer['filament_motion_sensor e%d_filament' % (st.extruder|int)] %}
        {% if sensor.filament_detected %}
            RESPOND MSG="ace_bridge: filament reached extruder {st.extruder}, restoring feeder auto"
            ACE_BRIDGE_SET_AUTO EXTRUDER={st.extruder} ENABLE=1 SAVE=0
            {% if st.autoload|int == 1 %}
                RESPOND MSG="ace_bridge: autoload enabled, starting U1 auto load for extruder {st.extruder}"
                AUTO_FEEDING EXTRUDER={st.extruder} LOAD=1
            {% else %}
                RESPOND MSG="ace_bridge: autoload disabled, waiting after sensor trip on extruder {st.extruder}"
            {% endif %}
            SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=active VALUE=0
            SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=poll_count VALUE=0
        {% elif st.poll_count|int >= st.max_polls|int %}
            RESPOND MSG="ace_bridge: load assist poll timed out for extruder {st.extruder}, restoring auto mode"
            ACE_BRIDGE_SET_AUTO EXTRUDER={st.extruder} ENABLE=1 SAVE=0
            SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=active VALUE=0
            SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=poll_count VALUE=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=poll_count VALUE={st.poll_count|int + 1}
            UPDATE_DELAYED_GCODE ID=_ACE_BRIDGE_LOAD_POLL DURATION=0.5
        {% endif %}
    {% endif %}

[gcode_macro ACE_BRIDGE_LOAD_LANE]
description: Coordinated load for one ACE lane and one U1 extruder.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    RESPOND MSG="ace_bridge: loading lane {lane} to extruder {extruder}"
    ACE_BRIDGE_FEED LANE={lane} LENGTH={length} EXTRUDER={extruder}

[gcode_macro ACE_BRIDGE_UNLOAD_LANE]
description: Coordinated unload for one U1 extruder back to one ACE lane.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    RESPOND MSG="ace_bridge: unloading extruder {extruder} to lane {lane}"
    AUTO_FEEDING EXTRUDER={extruder} UNLOAD=1
    ACE_BRIDGE_RETRACT LANE={lane} LENGTH={length}

[gcode_macro ACE_BRIDGE_LOAD_STAGE]
description: Stage filament from ACE to the U1 feeder with feeder auto disabled.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set extruder = params.EXTRUDER|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set speed = params.SPEED|default(60)|int %}
    {% set autoload = params.AUTOLOAD|default(0)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if extruder < 0 or extruder > 3 %}
        {action_raise_error("ACE_BRIDGE_LOAD_STAGE: EXTRUDER must be 0-3")}
    {% endif %}
    {% if lane < 0 or lane > 3 %}
        {action_raise_error("ACE_BRIDGE_LOAD_STAGE: LANE must be 0-3")}
    {% endif %}
    {% if state.ace_ready %}
        RESPOND MSG="ace_bridge: staging lane {lane} to extruder {extruder} with feeder auto disabled"
        ACE_BRIDGE_SET_AUTO EXTRUDER={extruder} ENABLE=0 SAVE=0
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=active VALUE=0
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=lane VALUE={lane}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=extruder VALUE={extruder}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=autoload VALUE={autoload}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=poll_count VALUE=0
        ACE_BRIDGE_PUSH LANE={lane} LENGTH={length} SPEED={speed}
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot stage load"
    {% endif %}

[gcode_macro ACE_BRIDGE_LOAD_ASSIST]
description: Enable ACE assist after feeder engagement and watch for toolhead arrival.
gcode:
    {% set st = printer['gcode_macro _ACE_BRIDGE_LOAD_STATE'] %}
    {% set lane = params.LANE|default(st.lane)|int %}
    {% set extruder = params.EXTRUDER|default(st.extruder)|int %}
    {% set timeout = params.TIMEOUT|default(90)|int %}
    {% set autoload = params.AUTOLOAD|default(st.autoload)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if extruder < 0 or extruder > 3 %}
        {action_raise_error("ACE_BRIDGE_LOAD_ASSIST: EXTRUDER must be 0-3")}
    {% endif %}
    {% if lane < 0 or lane > 3 %}
        {action_raise_error("ACE_BRIDGE_LOAD_ASSIST: LANE must be 0-3")}
    {% endif %}
    {% if state.ace_ready %}
        RESPOND MSG="ace_bridge: enabling assist on lane {lane} for extruder {extruder}"
        ACE_BRIDGE_GRAB LANE={lane}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=active VALUE=1
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=lane VALUE={lane}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=extruder VALUE={extruder}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=autoload VALUE={autoload}
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=poll_count VALUE=0
        SET_GCODE_VARIABLE MACRO=_ACE_BRIDGE_LOAD_STATE VARIABLE=max_polls VALUE={timeout * 2}
        UPDATE_DELAYED_GCODE ID=_ACE_BRIDGE_LOAD_POLL DURATION=0.5
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot start assist handoff"
    {% endif %}


[gcode_macro ACE_BRIDGE_PUSH]
description: Directly command ACE to feed filament without starting U1 AUTO_FEEDING.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(100)|int %}
    {% set speed = params.SPEED|default(60)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_FEED INSTANCE=0 INDEX=%d LENGTH=%d SPEED=%d" % (lane, length, speed))}
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot push filament"
    {% endif %}

[gcode_macro ACE_BRIDGE_PULL]
description: Directly command ACE to retract filament without touching U1 unload logic.
gcode:
    {% set lane = params.LANE|default(0)|int %}
    {% set length = params.LENGTH|default(100)|int %}
    {% set speed = params.SPEED|default(50)|int %}
    {% set state = printer['gcode_macro _ACE_BRIDGE_STATE'] %}
    {% if state.ace_ready %}
        {action_call_remote_method("router/gcode/script", target="ace", script="ACE_RETRACT INSTANCE=0 INDEX=%d LENGTH=%d SPEED=%d" % (lane, length, speed))}
    {% else %}
        RESPOND MSG="ace_bridge: ACE not ready, cannot retract filament"
    {% endif %}

[gcode_macro _ACE_LANE_MAP]
variable_t0_lane: 0
variable_t1_lane: 1
variable_t2_lane: 2
variable_t3_lane: 3
variable_t0_alt_lane: -1
variable_t1_alt_lane: -1
variable_t2_alt_lane: -1
variable_t3_alt_lane: -1
gcode:

[gcode_macro ACE_BRIDGE_LOAD_TOOL]
description: Coordinated load for a U1 tool number.
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set map = printer['gcode_macro _ACE_LANE_MAP'] %}
    {% set lanes = [map.t0_lane, map.t1_lane, map.t2_lane, map.t3_lane] %}
    {% if tool < 0 or tool > 3 %}
        {action_raise_error("ACE_BRIDGE_LOAD_TOOL: TOOL must be 0-3")}
    {% else %}
        {% set lane = lanes[tool] %}
        {% if lane < 0 %}
            RESPOND MSG="ace_bridge: T{tool} has no ACE lane assigned"
        {% else %}
            ACE_BRIDGE_LOAD_LANE LANE={lane} EXTRUDER={tool} LENGTH={length}
        {% endif %}
    {% endif %}

[gcode_macro ACE_BRIDGE_UNLOAD_TOOL]
description: Coordinated unload for a U1 tool number.
gcode:
    {% set tool = params.TOOL|default(0)|int %}
    {% set length = params.LENGTH|default(1200)|int %}
    {% set map = printer['gcode_macro _ACE_LANE_MAP'] %}
    {% set lanes = [map.t0_lane, map.t1_lane, map.t2_lane, map.t3_lane] %}
    {% if tool < 0 or tool > 3 %}
        {action_raise_error("ACE_BRIDGE_UNLOAD_TOOL: TOOL must be 0-3")}
    {% else %}
        {% set lane = lanes[tool] %}
        {% if lane < 0 %}
            RESPOND MSG="ace_bridge: T{tool} has no ACE lane assigned"
        {% else %}
            ACE_BRIDGE_UNLOAD_LANE LANE={lane} EXTRUDER={tool} LENGTH={length}
        {% endif %}
    {% endif %}
